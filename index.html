<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Планнер уроков</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Comfortaa:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

<div id="app-body" class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon" aria-hidden="true">📚</div>
      <div>
        <div class="brand-name">Планнер уроков</div>
        <div class="brand-sub">Расписание на неделю</div>
      </div>
    </div>
    <div id="theme-picker" class="theme-picker"></div>
  </header>

  <!-- ADD FORM -->
  <section class="form-card">
    <div class="form-card-title">
      <span class="form-card-icon" aria-hidden="true">➕</span>
      <span>Новый урок</span>
    </div>
    <form id="add-form" autocomplete="off">
      <div class="field">
        <div class="field-label">День</div>
        <div id="day-chips" class="day-chips"></div>
      </div>
      <div class="form-row">
        <div class="field field-time">
          <label class="field-label" for="time">Время</label>
          <input id="time" type="time" required value="08:00">
        </div>
        <div class="field field-subject">
          <label class="field-label" for="activity">ФИО</label>
          <input id="activity" type="text" placeholder="Анастасия Александровна…" required maxlength="60">
        </div>
      </div>
      <button type="submit" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Добавить</span>
      </button>
    </form>
  </section>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button type="button" id="library-btn" class="btn-secondary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M3 7v13a1 1 0 001 1h16a1 1 0 001-1V9a1 1 0 00-1-1h-9l-2-2H4a1 1 0 00-1 1z"/></svg>
      <span>Архив</span>
    </button>
    <button type="button" id="download-btn" class="btn-secondary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>PNG</span>
    </button>
    <button type="button" id="clear-btn" class="btn-ghost">Очистить</button>
  </div>

  <!-- SCHEDULE CARD (export target) -->
  <div class="schedule-card" id="schedule-card">
    <div class="schedule-card-head">
      <h2 class="schedule-title" id="schedule-title" contenteditable="true" spellcheck="false"></h2>
      <div class="schedule-meta-row">
        <span class="week-range" id="schedule-week-range"></span>
        <span class="title-hint" id="title-hint">нажми, чтобы переименовать</span>
      </div>
    </div>
    <div class="table-wrap">
      <div id="days-container"></div>
    </div>
    <footer class="schedule-footer" id="schedule-footer"></footer>
  </div>

  <p class="hint-bar">Нажми на ячейку таблицы — урок откроется для редактирования или добавления</p>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" hidden aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <h3 class="modal-title" id="modal-title">Урок</h3>
      <button class="modal-close" id="modal-close-btn" type="button" aria-label="Закрыть">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="modal-form" autocomplete="off">
      <div class="form-row">
        <div class="field field-time">
          <label class="field-label" for="modal-day-chips">День</label>
          <input id="modal-day-chips" type="date" required>
        </div>
      <div class="form-row">
        <div class="field field-time">
          <label class="field-label" for="modal-time">Время</label>
          <input id="modal-time" type="time" required>
        </div>
        <div class="field field-subject">
          <label class="field-label" for="modal-activity">Имя</label>
          <input id="modal-activity" type="text" placeholder="Анастасия Александровна…" required maxlength="60">
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-delete-btn" class="btn-danger" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          <span>Удалить</span>
        </button>
        <div class="modal-actions-right">
          <button type="button" id="modal-cancel-btn" class="btn-ghost btn-sm">Отмена</button>
          <button type="submit" class="btn-primary btn-sm">Сохранить</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- LIBRARY MODAL -->
<div class="modal-overlay" id="library-overlay" hidden aria-hidden="true">
  <div class="modal-card library-modal" role="dialog" aria-modal="true" aria-labelledby="library-title">
    <div class="modal-head">
      <h3 class="modal-title" id="library-title">📂 Мои расписания</h3>
      <button class="modal-close" id="library-close-btn" type="button" aria-label="Закрыть">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="library-body">
      <div class="library-save-row">
        <input id="preset-name-input" type="text" placeholder="Название (например: Стандартная неделя)" maxlength="50">
        <button id="preset-save-btn" type="button" class="btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Сохранить</span>
        </button>
      </div>
      <div class="library-divider"></div>
      <div class="library-list" id="library-list"></div>
      <div class="library-empty" id="library-empty" hidden>
        <span class="lib-empty-icon">📋</span>
        <p>Здесь появятся твои сохранённые расписания.<br>Нажми «Сохранить», чтобы сохранить текущее.</p>
      </div>
    </div>
  </div>
</div>

<div id="datalists-host" hidden></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

</body>
</html>
